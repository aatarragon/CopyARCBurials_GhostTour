function getIntCol(array, col){
   var column = new Array();
   for(var i=0; i<array.length; i++){
	  column.push(parseInt(array[i][col],10));
   }
   return column;
}

function getCol(array, col){
   var column = new Array();
   for(var i=0; i<array.length; i++){
	  column.push(array[i][col]);
   }
   return column;
}

function indexOfAll(array, search) {
  var i = array.indexOf(search),
      indexes = [];
  while (i !== -1) {
    indexes.push(i);
    i = array.indexOf(search, ++i);
  }
  return indexes;
}

function openFullscreen() {
	var doc = document.documentElement;
	if (doc.requestFullscreen) {
	doc.requestFullscreen();
	} else if (doc.mozRequestFullScreen) { 
	doc.mozRequestFullScreen();
	} else if (doc.webkitRequestFullscreen) { 
	doc.webkitRequestFullscreen();
	} else if (doc.msRequestFullscreen) { 
	doc.msRequestFullscreen();
	}
}

	
function onEachLot7Feature(feature, layer) {
    if (feature.properties && feature.properties.Full_Name) {
		var list ="<dl>"
		if (feature.properties.Highest_Ra != "Unknown" && feature.properties.Highest_Ra != null)
		{ 
				list = list + "<dt><b>" + feature.properties.Highest_Ra + " " + feature.properties.Full_Name + "</b></dt>"
				   + "<dt>" + feature.properties.Unit + "</dt><hr>"
				   
			
			layer.bindPopup(L.popup().setContent(list));
		} else {
			list = list + "<dt><b>" + feature.properties.Full_Name 
			if (feature.properties.Full_Name == "Unknown")
			{
				list = list + " [Soldiers Lot: " + "Headstone " + feature.properties.Headstone_ + "]"
				feature.properties.Full_Name = feature.properties.Full_Name + " [Soldiers Lot: Headstone " + feature.properties.Headstone_ + "]"
			}
			if (feature.properties.Unit != "Unknown" && feature.properties.Unit != "UNKNOWN                           (See Notes)" && feature.properties.Unit != "UNKNOWN")
			{
				list = list + "</b></dt>" + "<dt>" +  feature.properties.Unit
			}	
			list = list + "</b></dt><hr>"
		}
		
		if (feature.properties.Headstone_ == 42)
		{
			list = list + '<dt><a href ="https://www.albany.edu/arce/Soldiers33.html#"><img src="https://www.albany.edu/arce/images/Soldier33b.jpg" style="width:80%;height:80%;"></a></dt>'
		}
		
		if (feature.properties.Service_Re != "Unknown")
		{
			list = list + "<dt>" + feature.properties.Service_Re + "</dt><br/>"
		}
		if (feature.properties.Death == null || feature.properties.Death == "UNKNOWN")
		{
			list = list 
			   + "<dt>Date of death unknown : Headstone " + feature.properties.Headstone_ + "</dt></dl>"	
		}
		else
		{
			list = list 
			   + "<dt>Died " + feature.properties.Death + " : Headstone " + feature.properties.Headstone_ + "</dt></dl>"
		}
		feature.properties.title = "Lot7";
		layer.bindPopup(L.popup().setContent(list));
        
    }
}

function onEachSec49Feature(feature, layer) {
    if (feature.properties) {
		if (feature.properties.HeadstoneI != null)
		{	
			var y = feature.properties.HeadstoneI
			var x = getIntCol(s49data,37)
			var z = indexOfAll(x,y)
			
			var names = getCol(s49data,41)
			var dob = getCol(s49data,42)
			var dod = getCol(s49data,43)
			var stoneType = getCol(s49data, 39)
			var read = getCol(s49data, 38)
			
			var list = "<dl>" 
			var nameList = ""
			for(var i=0; i<z.length; i++){
				if (i == 0)
				{
					nameList = ""
				}
				if (i == 0 && z.length != 1)
				{
					
					list = list + "<dt><b>Section " + feature.properties.Section + ": Lot " + feature.properties.Lot + ", Row " + feature.properties.Row + ", Position " + feature.properties.Position + "</b></dt><hr>"
				}
				if (names[z[i]] != "UNKNOWN" && names[z[i]] != "#NAME?" && names[z[i]] != "")
				{
					list = list + "<dt><b>" + names[z[i]] + "</b></dt>"
					nameList += names[z[i]]
					if (z.length - 1 == i && z.length != 1)
					{
						nameList += ""
						layer.feature.properties["Full_Name"] = nameList;
						if (layer.feature.properties["Full_Name"].includes("Worth"))
						{
							layer.feature.properties["Full_Name"] = "Worth Family Monument";
						}
					} else if (z.length - 1 != i && z.length != 1){
						nameList += ", "
					}
					
					if (z.length == 1)
					{
						layer.feature.properties["Full_Name"] = names[z[i]]
					}
					

				} else {
					list = list + "<dt><b>" + "Unknown" + " [Section " + feature.properties.Section + ": Lot " + feature.properties.Lot + ", Row " + feature.properties.Row + ", Position " + feature.properties.Position + "]</b></dt>"
					layer.feature.properties["Full_Name"] = "Unknown" + " [Section " + feature.properties.Section + ": Lot " + feature.properties.Lot + ", Row " + feature.properties.Row + ", Position " + feature.properties.Position + "]"
				}
				if (i == 0 && z.length == 1)
				{
					list = list + "<hr>"
				}
				
				if (dob[z[i]] != null && dob[z[i]] != "")
				{
					list = list + "<dt>" + dob[z[i]] + " - "
				} else 
				{
					list = list + "<dt>" + "???? - "
				}
				if (dod[z[i]] != null && dod[z[i]] != "")
				{
					list = list + dod[z[i]] + "</dt>"
				} else 
				{
					list = list + "????</dt>"
				}
				if (stoneType[z[i]] != null && stoneType[z[i]] != "" && i == z.length - 1)
				{

					list = list + "<dt>Headstone is made from " + stoneType[z[i]] + ". It is "
					
					if (read[z[i]] == "Yes")
					{
						list = list + "fully readable.</dt>"
					}
					else if (read[z[i]] == "Partial")
					{
						list = list + "partially readable.</dt>"
					}
					else if (read[z[i]] == "No")
					{
						list = list + "not readable.</dt>"
					} else 
					{
						list = list + "</dt>"
					}
				}
				if (i != z.length - 1)
				{
					list = list + "<br/>"
				}
			}
			list = list + "Lot " + feature.properties.Lot + ", Row " + feature.properties.Row + ", Position " + feature.properties.Position + "</dl>"
		}
		feature.properties.title = "Sec49";
		layer.bindPopup(L.popup().setContent(list));
    }
}

function onEachSection(feature, layer) {
    if (feature.properties && feature.properties.Section) {
		layer.on('mouseover', function () {
		  this.setStyle({
			'weight': '6'
		  });
		});
		layer.on('mouseout', function () {
			this.setStyle({
				'weight': '2'
			  });
		});
		var list ="<dl>"
		list = list + "<dt><b>Section " + feature.properties.Section;
		if (String(feature.properties.Section) == "49")
		{
			list = list + ", Lot " + feature.properties.Lot + ": " + feature.properties.Comments
		}
		list = list + "</b></dt></dl>"
		layer.bindPopup(list, {permanent: true, 
				   direction: "center"}).openPopup();
    }
}

function onEachRoad(feature, layer) {
    if (feature.properties && feature.properties.Motor_Vehi) {
		var list ="<dl>"
		list = list + "<dt>";
		if (feature.properties.Cemetery_R != null)
		{
			list = list + "<b>" + feature.properties.Cemetery_R + "</b><br/>"
		}
		if (feature.properties.Motor_Vehi == "YES")
		{
			list = list + "Motor vehicle accessible."
			layer.setStyle(motorRoadsStyle);
		} else 
		{
			list = list + "Not accessible by motor vehicles."
		}

		layer.bindPopup(L.popup().setContent(list));
    }
}

			map.flyTo(latlng, 21); // access the zoom
			
		}
		});
	}
	

	searchControl.on('search:locationfound', function(e) {
		var selected = e;
		e.layer.setStyle({weight: 4});
		if(e.layer._popup)
			e.layer.openPopup();

		var selected = null;
		featuresLayer.eachLayer(function(layer) {	//restore feature color

		fullscreen.addTo(map);
